<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>少年禪修錄 - 全場景版</title>
    <style>
        body { margin: 0; background: #000; font-family: "PingFang TC", serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        #game-canvas { background: #71aa34; display: block; width: 100%; height: 60%; touch-action: none; cursor: crosshair; }
        #ui-panel { flex: 1; background: #F2EFE9; padding: 10px; border-top: 4px solid #8B4513; display: flex; flex-direction: column; position: relative; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 5px; }
        .stat-box { background: #fff; border: 1px solid #C5A059; text-align: center; padding: 5px; border-radius: 5px; }
        .stat-val { font-size: 16px; font-weight: bold; color: #3D4F40; display: block; }
        .stat-label { font-size: 10px; color: #888; }
        #dialogue { flex: 1; background: rgba(255,255,255,0.8); border-radius: 8px; padding: 12px; font-size: 15px; overflow-y: auto; border: 1px solid #ddd; }
        .controls { position: absolute; right: 15px; top: -160px; display: grid; grid-template-columns: repeat(3, 55px); gap: 8px; z-index: 100; }
        .btn { width: 55px; height: 55px; background: rgba(255,255,255,0.7); border: 2px solid #333; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; font-weight: bold; }
        .btn:active { background: #C5A059; color: white; }
        #scene-name { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); color: white; padding: 2px 12px; border-radius: 15px; font-size: 14px; z-index: 50; }
    </style>
</head>
<body>

<div id="scene-name">院落步道</div>
<canvas id="game-canvas"></canvas>

<div id="ui-panel">
    <div class="controls">
        <div></div><div class="btn" onclick="move(0,-20)">↑</div><div></div>
        <div class="btn" onclick="move(-20,0)">←</div><div class="btn" onclick="move(0,20)">↓</div><div class="btn" onclick="move(20,0)">→</div>
    </div>
    
    <div class="stats">
        <div class="stat-box"><span class="stat-val" id="d">10</span><span class="stat-label">定力</span></div>
        <div class="stat-box"><span class="stat-val" id="w">10</span><span class="stat-label">智慧</span></div>
        <div class="stat-box"><span class="stat-label">福德</span><span class="stat-val" id="f">10</span></div>
        <div class="stat-box"><span class="stat-label">行持</span><span class="stat-val" id="x">10</span></div>
    </div>
    
    <div id="dialogue"><b>【師父】</b> 修行之路始於足下。走進不同場景建築，觸發不同支線修行。</div>
    <div style="text-align:center; font-size:12px; color:#999; margin-top:5px;" id="lvl-info">等級：小男生 | 修行中...</div>
</div>

<script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    
    let s = JSON.parse(localStorage.getItem('zen_rpg_final')) || { d:10, w:10, f:10, x:10, lvl:"小男生", day:1 };
    let player = { x: 100, y: 150 };
    let currentScene = 'main';

    const maps = {
        main: {
            color: '#71aa34', name: '院落步道',
            portals: [
                { x: 150, y: 20, w: 80, h: 40, to: 'temple', label: '大殿', c: '#8B4513' },
                { x: 30, y: 50, w: 60, h: 60, to: 'library', label: '藏經閣', c: '#5D6D5E' },
                { x: 250, y: 180, w: 80, h: 60, to: 'backhill', label: '後山', c: '#A0522D' },
                { x: 20, y: 180, w: 60, h: 40, to: 'hall', label: '圓通寶殿', c: '#FFD700' }
            ]
        },
        temple: { color: '#442211', name: '大殿禪堂', back: {x:180, y:200}, text: '香霧繚繞，定力提升中...' },
        library: { color: '#3d3d3d', name: '藏經閣', back: {x:60, y:150}, text: '翻閱經典，心生智慧...' },
        backhill: { color: '#225522', name: '後山庭院', back: {x:280, y:150}, text: '掃地出坡，勤種福德...' },
        hall: { color: '#554400', name: '圓通寶殿', back: {x:50, y:150}, text: '至誠禮拜，感應道交...' }
    };

    function draw() {
        const scene = maps[currentScene];
        document.getElementById('scene-name').innerText = scene.name;
        
        // 畫背景
        ctx.fillStyle = scene.color;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 畫裝飾 (主地圖有傳送門)
        if (currentScene === 'main') {
            scene.portals.forEach(p => {
                ctx.fillStyle = p.c;
                ctx.fillRect(p.x, p.y, p.w, p.h);
                ctx.fillStyle = "white";
                ctx.fillText(p.label, p.x + 10, p.y + 25);
            });
        } else {
            // 室內畫一個出口
            ctx.fillStyle = "rgba(255,255,255,0.3)";
            ctx.fillRect(10, canvas.height - 40, 60, 30);
            ctx.fillStyle = "white";
            ctx.fillText("離開", 20, canvas.height - 20);
        }

        // 畫玩家
        ctx.fillStyle = "#ffdbac"; // 臉
        ctx.beginPath(); ctx.arc(player.x, player.y - 15, 10, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = s.lvl === "小男生" ? "#888" : "#C5A059"; // 衣服
        ctx.fillRect(player.x - 12, player.y - 5, 24, 20);
    }

    function move(dx, dy) {
        player.x += dx; player.y += dy;
        player.x = Math.max(20, Math.min(player.x, canvas.width-20));
        player.y = Math.max(20, Math.min(player.y, canvas.height-20));
        
        checkCollision();
        draw();
    }

    function checkCollision() {
        if (currentScene === 'main') {
            maps.main.portals.forEach(p => {
                if (player.x > p.x && player.x < p.x + p.w && player.y > p.y && player.y < p.y + p.h) {
                    currentScene = p.to;
                    player.x = canvas.width/2; player.y = canvas.height - 50;
                    log(`進入 ${maps[p.to].name}`);
                }
            });
        } else {
            // 修行邏輯與離開邏輯
            if (player.x < 70 && player.y > canvas.height - 50) {
                const backPos = maps[currentScene].back;
                currentScene = 'main';
                player.x = backPos.x; player.y = backPos.y;
            } else {
                // 具體修行屬性 (依照場景)
                if (currentScene === 'temple') s.d += 1;
                if (currentScene === 'library') s.w += 1;
                if (currentScene === 'backhill') s.f += 1;
                if (currentScene === 'hall') { s.d+=0.5; s.w+=0.5; s.f+=0.5; }
                
                // 隨機事件 (依照文件)
                const r = Math.random();
                if(r < 0.003) { 
                    s.d+=30; s.w+=30; s.f+=30; s.x+=30; 
                    alert("🌟【開悟瞬間】一瞬間，你明白了什麼。全屬性+30！");
                } else if(r < 0.01) {
                    s.w -= 5; log("❌【事件】上課遲到，智慧下降。");
                }
                
                log(maps[currentScene].text);
            }
        }
        updateUI();
    }

    function log(m) { document.getElementById('dialogue').innerHTML = `<b>【記錄】</b> ${m}`; }

    function updateUI() {
        document.getElementById('d').innerText = Math.floor(s.d);
        document.getElementById('w').innerText = Math.floor(s.w);
        document.getElementById('f').innerText = Math.floor(s.f);
        document.getElementById('x').innerText = Math.floor(s.x);
        
        // 境界判定 (依照文件)
        const max = Math.max(s.d, s.w, s.f, s.x);
        const count200 = [s.d,s.w,s.f,s.x].filter(v=>v>=200).length;
        const count400 = [s.d,s.w,s.f,s.x].filter(v=>v>=400).length;

        let newLvl = "小男生";
        if (count400 >= 3) newLvl = "總長";
        else if (count200 >= 3) newLvl = "學長";
        else if (max > 100) newLvl = "研經班";
        else if (max > 80) newLvl = "高級班";
        else if (max > 40) newLvl = "中級班";
        else if (max > 20) newLvl = "初級班";

        if(newLvl !== s.lvl) {
            s.lvl = newLvl;
            alert(`✨ 境界提升：${newLvl}！\n師父說：你可以進入新班級修學了。`);
        }
        document.getElementById('lvl-info').innerText = `等級：${s.lvl} | 修行進行中`;
        localStorage.setItem('zen_rpg_final', JSON.stringify(s));
    }

    function init() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight * 0.6;
        draw();
    }

    window.addEventListener('resize', init);
    init();
    updateUI();
</script>
</body>
</html>
