<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>少年禪修錄 - 完整情境版</title>
    <style>
        :root { --ink: #2C2C2C; --paper: #F2EFE9; --gold: #C5A059; --zen: #3D4F40; }
        body { margin: 0; background: #1a1a1a; font-family: "PingFang TC", serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        #game-canvas { background: #71aa34; display: block; width: 100%; height: 50%; touch-action: none; }
        #ui-panel { flex: 1; background: var(--paper); border-top: 4px solid #8B4513; display: flex; flex-direction: column; padding: 10px; box-sizing: border-box; position: relative; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 5px; }
        .stat-box { background: #fff; border: 1px solid var(--gold); text-align: center; padding: 3px; border-radius: 5px; font-size: 13px; }
        .stat-val { font-weight: bold; color: var(--zen); }
        #display-area { flex: 1; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
        #dialogue { background: rgba(255,255,255,0.8); padding: 10px; border-radius: 8px; font-size: 15px; border: 1px solid #ddd; min-height: 45px; line-height: 1.4; }
        #action-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .menu-btn { background: var(--zen); color: white; border: none; padding: 12px 5px; border-radius: 5px; font-size: 14px; cursor: pointer; }
        .menu-btn.bad { background: #A63D40; }
        .controls { position: absolute; right: 10px; top: -145px; display: grid; grid-template-columns: repeat(3, 46px); gap: 5px; }
        .btn { width: 46px; height: 46px; background: rgba(255,255,255,0.8); border: 1.5px solid #333; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 18px; user-select: none; }
        #scene-title { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); color: #fff; padding: 2px 12px; border-radius: 15px; font-size: 13px; z-index: 10; }
    </style>
</head>
<body>

<div id="scene-title">位置：載入中...</div>
<canvas id="game-canvas"></canvas>

<div id="ui-panel">
    <div class="controls">
        <div></div><div class="btn" onclick="move(0,-25)">↑</div><div></div>
        <div class="btn" onclick="move(-25,0)">←</div><div class="btn" onclick="move(0,25)">↓</div><div class="btn" onclick="move(25,0)">→</div>
    </div>
    <div class="stats">
        <div class="stat-box">定 <span class="stat-val" id="d">10</span></div>
        <div class="stat-box">智 <span class="stat-val" id="w">10</span></div>
        <div class="stat-box">福 <span class="stat-val" id="f">10</span></div>
        <div class="stat-box">行 <span class="stat-val" id="x">10</span></div>
    </div>
    <div id="display-area">
        <div id="dialogue"><b>【系統】</b> 走近場景中的物件，會自動跳出修行選項。</div>
        <div id="action-menu"></div>
    </div>
</div>

<script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');

    // --- 圖片定義 (與您的檔名一致) ---
    const v = "?v=" + Date.now();
    const images = {
        boy: new Image(), niche: new Image(), burner: new Image(),
        futon: new Image(), bookcase: new Image(),
        standBuddha: new Image(), garden: new Image(), tree: new Image()
    };
    images.boy.src = 'boy.png' + v;
    images.niche.src = 'buddhist niche.png' + v;
    images.burner.src = 'incense burner.png' + v;
    images.futon.src = 'futon.png' + v;
    images.bookcase.src = 'bookcase.png' + v;
    images.standBuddha.src = 'stand_buddha.png' + v;
    images.garden.src = 'garden.png' + v;
    images.tree.src = 'tree.png' + v;

    let s = JSON.parse(localStorage.getItem('zen_v13')) || { d:10, w:10, f:10, x:10 };
    let player = { x: 150, y: 150 };
    let currentScene = 'world';

    const mapData = {
        world: { bg: '#71aa34', name: '院落步道', objs: [
            { x: 30, y: 30, w: 70, h: 60, color: '#5D6D5E', label: '藏經閣', to: 'library' },
            { x: 160, y: 20, w: 90, h: 70, color: '#8B4513', label: '大殿', to: 'temple' },
            { x: 250, y: 160, w: 80, h: 70, color: '#225522', label: '後山', to: 'backhill' }
        ]},
        library: { bg: '#e5d5b5', name: '藏經閣', objs: [
            { x: 50, y: 30, w: 50, h: 100, img: images.bookcase, label: '書櫃', type: 'books' },
            { x: 150, y: 80, w: 60, h: 40, color: '#8B4513', label: '書桌', type: 'study' }
        ]},
        temple: { bg: '#4a2211', name: '大雄寶殿', objs: [
            { x: 130, y: 20, w: 100, h: 100, img: images.niche, label: '佛像', type: 'buddha' },
            { x: 165, y: 110, w: 40, h: 30, img: images.burner, label: '香爐', type: 'incense' },
            { x: 20, y: 20, w: 50, h: 50, color: '#ADD8E6', label: '窗戶', type: 'window' },
            { x: 100, y: 150, w: 40, h: 20, img: images.futon, label: '蒲團', type: 'sit' }
        ]},
        backhill: { bg: '#3a5a3a', name: '後山', objs: [
            { x: 100, y: 30, w: 60, h: 100, img: images.standBuddha, label: '站立佛像', type: 'stand_buddha' },
            { x: 220, y: 40, w: 100, h: 100, img: images.garden, label: '菜園', type: 'garden' },
            { x: 30, y: 120, w: 80, h: 100, img: images.tree, label: '大樹', type: 'tree' }
        ]}
    };

    function draw() {
        const sc = mapData[currentScene];
        document.getElementById('scene-title').innerText = "位置：" + sc.name;
        ctx.fillStyle = sc.bg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        sc.objs.forEach(obj => {
            if (obj.img && obj.img.complete && obj.img.naturalWidth !== 0) {
                ctx.drawImage(obj.img, obj.x, obj.y, obj.w, obj.h);
            } else {
                ctx.fillStyle = obj.color || "rgba(255,255,255,0.2)";
                ctx.fillRect(obj.x, obj.y, obj.w, obj.h);
            }
            ctx.fillStyle = "#fff";
            ctx.fillText(obj.label, obj.x, obj.y - 5);
        });

        if (images.boy.complete && images.boy.naturalWidth !== 0) {
            ctx.drawImage(images.boy, player.x - 20, player.y - 45, 40, 50);
        } else {
            ctx.fillStyle = "#ffdbac";
            ctx.beginPath(); ctx.arc(player.x, player.y - 15, 10, 0, Math.PI*2); ctx.fill();
        }
    }

    function move(dx, dy) {
        player.x += dx; player.y += dy;
        player.x = Math.max(15, Math.min(player.x, canvas.width-15));
        if (currentScene !== 'world' && player.y > canvas.height - 10) {
            currentScene = 'world'; player.y = 150; 
            log("回到了院落。");
        } else {
            player.y = Math.max(15, Math.min(player.y, canvas.height-5));
        }
        checkCollision();
        draw();
    }

    function checkCollision() {
        const sc = mapData[currentScene];
        let found = false;
        sc.objs.forEach(obj => {
            if (player.x > obj.x-30 && player.x < obj.x+obj.w+30 && player.y > obj.y-30 && player.y < obj.y+obj.h+30) {
                showMenu(obj); found = true;
            }
        });
        if(!found) {
            document.getElementById('action-menu').innerHTML = "";
            document.getElementById('action-menu').removeAttribute('data-active');
        }
    }

    function showMenu(obj) {
        const menu = document.getElementById('action-menu');
        if(menu.getAttribute('data-active') === (obj.type || obj.label)) return;
        menu.innerHTML = "";
        menu.setAttribute('data-active', (obj.type || obj.label));

        let opts = [];
        if(obj.to) opts.push({n: `進入${obj.label}`, fn: () => { currentScene=obj.to; player.y=canvas.height-40; draw(); }});
        
        // --- 大殿情境 ---
        if(obj.type === 'buddha') {
            opts.push({n: "禮佛 (+10)", fn: () => update('d',10,'禮佛一拜。')});
            opts.push({n: "拜懺 (+10)", fn: () => update('d',10,'至誠拜懺。')});
            opts.push({n: "擦佛像 (+5)", fn: () => update('f',5,'勤拭佛像。')});
            opts.push({n: "哈哈大笑 (-5)", fn: () => update('d',-5,'殿內喧嘩。', true)});
        }
        if(obj.type === 'incense') {
            opts.push({n: "整理香爐 (+5)", fn: () => update('f',5,'整理香爐。')});
            opts.push({n: "上香 (+5)", fn: () => update('f',5,'上香供養。')});
        }
        if(obj.type === 'window') {
            opts.push({n: "擦窗戶 (+5)", fn: () => update('f',5,'擦拭窗戶。')});
            opts.push({n: "滑手機 (-5)", fn: () => update('w',-5,'虛度光陰。', true)});
        }
        if(obj.type === 'sit') {
            opts.push({n: "打坐 (+10)", fn: () => update('d',10,'打坐觀心。')});
            opts.push({n: "翹腳 (-5)", fn: () => update('x',-5,'威儀不整。', true)});
        }

        // --- 後山情境 ---
        if(obj.type === 'stand_buddha') {
            opts.push({n: "洗佛像 (+10)", fn: () => update('f',10,'清淨佛身。')});
        }
        if(obj.type === 'garden') {
            opts.push({n: "整理菜園 (+5)", fn: () => update('f',5,'整理菜園。')});
            opts.push({n: "澆水 (+5)", fn: () => update('f',5,'澆水修行。')});
            opts.push({n: "拔草 (+5)", fn: () => update('f',5,'拔除雜草。')});
        }
        if(obj.type === 'tree') {
            opts.push({n: "掃落葉 (+5)", fn: () => update('f',5,'掃除落葉。')});
            opts.push({n: "樹下睡覺 (-5)", fn: () => update('x',-5,'偷懶睡覺。', true)});
            opts.push({n: "搶工具 (-5)", fn: () => update('x',-5,'心生慢心。', true)});
        }
        
        // --- 藏經閣情境 ---
        if(obj.type === 'books') {
            opts.push({n: "背誦經文 (+5)", fn: () => update('w',5,'研讀經典。')});
        }

        opts.forEach(o => {
            const b = document.createElement('button');
            b.className = "menu-btn" + (o.bad ? " bad" : "");
            b.innerText = o.n;
            b.onclick = o.fn;
            menu.appendChild(b);
        });
    }

    function update(type, val, msg, isBad = false) {
        s[type] += val;
        log(isBad ? `<span style="color:red">【事件】${msg}</span>` : `<b>【修行】</b>${msg}`);
        updateUI();
    }

    function log(m) { document.getElementById('dialogue').innerHTML = m; }

    function updateUI() {
        document.getElementById('d').innerText = Math.floor(s.d);
        document.getElementById('w').innerText = Math.floor(s.w);
        document.getElementById('f').innerText = Math.floor(s.f);
        document.getElementById('x').innerText = Math.floor(s.x);
        localStorage.setItem('zen_v13', JSON.stringify(s));
    }

    function init() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight * 0.5;
        draw();
    }
    window.addEventListener('resize', init);
    init();
    setInterval(draw, 600);
</script>
</body>
</html>
