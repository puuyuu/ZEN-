<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>少年禪修錄 - 最終修正版</title>
    <style>
        :root { --ink: #2C2C2C; --paper: #F2EFE9; --gold: #C5A059; --zen: #3D4F40; }
        body { margin: 0; background: #000; font-family: "PingFang TC", serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        #game-canvas { background: #71aa34; display: block; width: 100%; height: 50%; touch-action: none; }
        #ui-panel { flex: 1; background: var(--paper); border-top: 4px solid #8B4513; display: flex; flex-direction: column; padding: 10px; box-sizing: border-box; position: relative; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 5px; }
        .stat-box { background: #fff; border: 1px solid var(--gold); text-align: center; padding: 3px; border-radius: 5px; font-size: 13px; }
        .stat-val { font-weight: bold; color: var(--zen); }
        #display-area { flex: 1; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
        #dialogue { background: rgba(255,255,255,0.8); padding: 10px; border-radius: 8px; font-size: 15px; border: 1px solid #ddd; min-height: 40px; line-height: 1.4; }
        #action-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .menu-btn { background: var(--zen); color: white; border: none; padding: 12px 5px; border-radius: 5px; font-size: 14px; cursor: pointer; }
        .controls { position: absolute; right: 10px; top: -150px; display: grid; grid-template-columns: repeat(3, 48px); gap: 5px; }
        .btn { width: 48px; height: 48px; background: rgba(255,255,255,0.8); border: 1.5px solid #333; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 18px; }
        #scene-title { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); color: #fff; padding: 2px 12px; border-radius: 15px; font-size: 13px; }
    </style>
</head>
<body>

<div id="scene-title">院落步道</div>
<canvas id="game-canvas"></canvas>

<div id="ui-panel">
    <div class="controls">
        <div></div><div class="btn" onclick="move(0,-20)">↑</div><div></div>
        <div class="btn" onclick="move(-20,0)">←</div><div class="btn" onclick="move(0,20)">↓</div><div class="btn" onclick="move(20,0)">→</div>
    </div>
    <div class="stats">
        <div class="stat-box">定 <span class="stat-val" id="d">10</span></div>
        <div class="stat-box">智 <span class="stat-val" id="w">10</span></div>
        <div class="stat-box">福 <span class="stat-val" id="f">10</span></div>
        <div class="stat-box">行 <span class="stat-val" id="x">10</span></div>
    </div>
    <div id="display-area">
        <div id="dialogue"><b>【系統】</b> 歡迎來到普里禪寺。請控制角色走動。</div>
        <div id="action-menu"></div>
    </div>
</div>

<script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');

    // --- 圖片載入 ---
    const imgBoy = new Image(); imgBoy.src = 'boy.png';
    const imgNiche = new Image(); imgNiche.src = 'buddhist niche.png';
    const imgBurner = new Image(); imgBurner.src = 'incense burner.png';
    const imgFuton = new Image(); imgFuton.src = 'futon.png';
    const imgBookcase = new Image(); imgBookcase.src = 'bookcase.png';
    const imgStandBuddha = new Image(); imgStandBuddha.src = 'stand_buddha.png';
    const imgGarden = new Image(); imgGarden.src = 'garden.png';
    const imgTree = new Image(); imgTree.src = 'tree.png';

    let s = JSON.parse(localStorage.getItem('zen_final_v10')) || { d:10, w:10, f:10, x:10, lvl:"小男生" };
    let player = { x: 150, y: 150 };
    let currentScene = 'world';

    const mapData = {
        world: { bg: '#71aa34', name: '院落步道', objs: [
            { x: 30, y: 30, w: 70, h: 60, color: '#5D6D5E', label: '藏經閣', to: 'library' },
            { x: 160, y: 20, w: 90, h: 70, color: '#8B4513', label: '大殿', to: 'temple' },
            { x: 250, y: 160, w: 80, h: 70, color: '#225522', label: '後山', to: 'backhill' }
        ]},
        library: { bg: '#e5d5b5', name: '藏經閣', objs: [
            { x: 50, y: 30, w: 50, h: 100, img: imgBookcase, label: '書櫃', type: 'books' },
            { x: 150, y: 80, w: 60, h: 40, color: '#8B4513', label: '書桌', type: 'study' }
        ]},
        temple: { bg: '#4a2211', name: '大雄寶殿', objs: [
            { x: 130, y: 20, w: 100, h: 100, img: imgNiche, label: '佛龕', type: 'buddha' },
            { x: 165, y: 110, w: 40, h: 30, img: imgBurner, label: '香爐', type: 'incense' },
            { x: 20, y: 20, w: 50, h: 50, color: '#ADD8E6', label: '窗戶', type: 'window' },
            { x: 100, y: 150, w: 40, h: 20, img: imgFuton, label: '蒲團', type: 'sit' }
        ]},
        backhill: { bg: '#3a5a3a', name: '後山', objs: [
            { x: 100, y: 30, w: 60, h: 100, img: imgStandBuddha, label: '站立佛像', type: 'stand_buddha' },
            { x: 220, y: 40, w: 100, h: 100, img: imgGarden, label: '菜園', type: 'garden' },
            { x: 30, y: 120, w: 80, h: 100, img: imgTree, label: '大樹', type: 'tree' }
        ]}
    };

    function draw() {
        const sc = mapData[currentScene];
        document.getElementById('scene-title').innerText = "位置：" + sc.name;
        ctx.fillStyle = sc.bg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        sc.objs.forEach(obj => {
            if (obj.img && obj.img.complete && obj.img.naturalWidth !== 0) {
                ctx.drawImage(obj.img, obj.x, obj.y, obj.w, obj.h);
            } else {
                ctx.fillStyle = obj.color || "rgba(255,255,255,0.2)";
                ctx.fillRect(obj.x, obj.y, obj.w, obj.h);
            }
            ctx.fillStyle = "#fff";
            ctx.font = "12px Arial";
            ctx.fillText(obj.label, obj.x, obj.y - 5);
        });

        if (imgBoy.complete && imgBoy.naturalWidth !== 0) {
            ctx.drawImage(imgBoy, player.x - 20, player.y - 45, 40, 50);
        } else {
            ctx.fillStyle = "#ffdbac";
            ctx.beginPath(); ctx.arc(player.x, player.y - 15, 10, 0, Math.PI*2); ctx.fill();
        }
    }

    function move(dx, dy) {
        player.x += dx; player.y += dy;
        player.x = Math.max(15, Math.min(player.x, canvas.width-15));
        
        if (currentScene !== 'world' && player.y > canvas.height - 5) {
            currentScene = 'world'; player.y = 150; 
            document.getElementById('action-menu').innerHTML = "";
            log("回到了院落。");
        } else {
            player.y = Math.max(15, Math.min(player.y, canvas.height-5));
        }
        checkCollision();
        draw();
    }

    function checkCollision() {
        const sc = mapData[currentScene];
        let found = false;
        sc.objs.forEach(obj => {
            if (player.x > obj.x-25 && player.x < obj.x+obj.w+25 && player.y > obj.y-25 && player.y < obj.y+obj.h+25) {
                showMenu(obj); found = true;
            }
        });
        if(!found) {
            document.getElementById('action-menu').innerHTML = "";
            document.getElementById('action-menu').removeAttribute('data-active');
        }
    }

    function showMenu(obj) {
        const menu = document.getElementById('action-menu');
        if(menu.getAttribute('data-active') === obj.type) return;
        menu.innerHTML = "";
        menu.setAttribute('data-active', obj.type);

        let options = [];
        if(obj.to) options.push({n: `進入${obj.label}`, fn: () => { currentScene=obj.to; player.y=canvas.height-40; updateUI(); draw(); }});
        
        if(obj.type === 'books' || obj.type === 'study') {
            ["心經", "七週緣慈", "大悲咒", "楞嚴咒", "金剛經"].forEach(b => {
                options.push({n: "誦持 "+b, fn: () => update('w', 5, `認真背誦《${b}》。`)});
            });
        }
        if(obj.type === 'buddha') {
            options
